name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: i18n completeness
        run: npm run check:i18n

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          CI: true
          # Optional: enables the Google Sign-In button when configured in repo secrets
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          # Sentry error reporting (DSN is a public ingest address, not a secret).
          # Forks: replace with your own DSN or delete this line to disable.
          VITE_SENTRY_DSN: https://d0392d462b00f60bdc0c7a89554067d5@o4511716388503552.ingest.us.sentry.io/4511716411047936

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
